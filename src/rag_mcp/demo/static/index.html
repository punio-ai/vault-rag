<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Knowledge Base — Demo</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    max-width: 700px;
    margin: 60px auto;
    padding: 0 20px;
  }
  h1 { font-size: 1.4rem; color: #f8fafc; }
  p.sub { color: #94a3b8; margin-top: -8px; }
  #chat {
    background: #1e293b;
    border-radius: 10px;
    padding: 16px;
    min-height: 200px;
    margin-bottom: 16px;
  }
  .msg { margin-bottom: 14px; line-height: 1.5; }
  .msg.user { color: #7dd3fc; font-weight: 600; }
  .msg.answer { color: #e2e8f0; }
  .sources { color: #64748b; font-size: 0.85rem; margin-top: 4px; }
  form { display: flex; gap: 8px; }
  input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #f8fafc;
  }
  button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    color: #0f172a;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>Private Knowledge Base Assistant</h1>
  <p class="sub">Runs entirely on local hardware — no data leaves this machine.</p>

  <div id="chat"></div>

  <form id="form">
    <input id="question" placeholder="Ask a question about the documents..." autocomplete="off" />
    <button id="submit" type="submit">Ask</button>
  </form>

<script>
const form = document.getElementById('form');
const input = document.getElementById('question');
const chat = document.getElementById('chat');
const submitBtn = document.getElementById('submit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;

  chat.innerHTML += `<div class="msg user">You: ${question}</div>`;
  input.value = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'Thinking...';

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    const sources = data.sources.map(s => s.source).join(', ') || 'none';
    chat.innerHTML += `
      <div class="msg answer">${data.answer}</div>
      <div class="sources">Sources: ${sources}</div>
    `;
  } catch (err) {
    chat.innerHTML += `<div class="msg answer">Error: could not reach server.</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Ask';
    chat.scrollTop = chat.scrollHeight;
  }
});
</script>
</body>
</html>
